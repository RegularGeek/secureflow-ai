version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd $CODEBUILD_SRC_DIR/secureflow-ai/web
        - npm install --no-audit --no-fund
    build:
      commands:
        - cd $CODEBUILD_SRC_DIR/secureflow-ai/web
        - npm run build
  artifacts:
    baseDirectory: web/out
    files:
      - "**/*"
  cache:
    paths:
      - web/node_modules/**/*
