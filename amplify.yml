version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd web
        - npm install --no-audit --no-fund
    build:
      commands:
        - cd web
        - npm run build
  artifacts:
    baseDirectory: web/out
    files:
      - '**/*'
  cache:
    paths:
      - web/node_modules/**/*
